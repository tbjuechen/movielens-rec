# MovieLens Recommendation System Configuration
# Tuned for A100 GPU + 100 CPU cores

# 1. Path Settings
paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  feature_store_dir: "data/feature_store"
  model_weights_dir: "data/model_weights"

# 2. Recall Hyperparameters
recall:
  top_k: 100
  embedding_dim: 128
  tau: 0.07
  bpr_gamma: 5.0  # BPR-specific scaling factor for sigmoid input
  bpr_margin: 0.1  # BPR margin: forces pos-neg gap before scoring correct
  logit_scale_max: 100.0  # Clamp for learnable tau (min tau = 1/max)
  cont_bucket_size: 20  # Number of bins for continuous feature discretization
  # Mixed Loss Weights
  loss_infonce_weight: 1.0
  loss_bpr_weight: 1.0

# 3. Training Settings
training:
  batch_size: 4096
  learning_rate: 0.001
  epochs: 5
  # Negative Sampling Sizes
  inbatch_neg_size: 4096
  global_neg_size: 2048
  hard_neg_size: 512
  num_workers: 32

# 5. CF Settings
cf:
  top_k: 50
  cf_workers: 32

# 6. Merger Weights (Tuned for Recall maximization)
merger_weights:
  dual_tower: 0.5
  item_cf: 0.8
  user_cf: 1.0
  popularity: 0.01
  genre: 0.05

# 4. Ranking Model Settings
ranking:
  # Mixed embedding dimensions (D = 6 * N^0.25, clamped to power of 2)
  id_embed_dim: 64           # user_id, item_id (high cardinality ~330K/87K)
  genre_embed_dim: 8         # genre features (low cardinality ~20)
  cont_embed_dim: 8          # bucketized continuous features (20 bins)
  cont_bucket_size: 20
  hist_seq_maxlen: 50
  din_attention_hidden: [128, 64]
  # DCNv2
  cross_layers: 3
  dropout: 0.2
  # MMoE
  num_experts: 4
  expert_dim: 128
  # Task Towers
  tower_dims: [64, 32]
  # Training
  batch_size: 16384
  learning_rate: 0.0005
  bpr_weight: 0.1
  weight_decay: 1e-4
  warmup_epochs: 1
  epochs: 10
  early_stop_metric: mrr
  neg_sample_ratio: 3
  objective: ctr
  negatives_per_positive: 4
  hard_negative_topk: 50
  explicit_negative_threshold: 3.0
  hard_negative_mix: [3, 1]
  num_workers: 16
  # Loss (GradNorm auto-balances BCE and MSE)
  gradnorm_alpha: 1.5
  # Multi-Objective Scoring
  ctr_alpha: 1.0
  rating_beta: 0.5
  # Evaluation
  eval_ks: [10, 20, 50]
  train_pool_size: 100
  eval_pool_size: 500
  force_insert_target: true

# 5. Feature Settings
features:
  user_history_max_len: 50
  user_top_genres_max_len: 3
  item_genres_max_len: 5
  time_decay_lambda: 0.001
